<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Води под натиск: Пазители на живо</title>
<style>
  :root{
    /* Lighter, optimistic background — softer "morning over water" instead of midnight */
    --bg1:#0e2030;
    --bg2:#163450;
    --bg3:#1f4868;
    --panel:rgba(18,40,62,0.74);
    --panel2:rgba(28,56,84,0.86);
    --panel3:rgba(255,255,255,0.07);
    --line:rgba(255,255,255,0.14);
    --text:#f1f7ff;
    --muted:#bcd2e3;
    /* Brighter, friendlier accents */
    --cyan:#5ddfff;       /* sky-bright cyan */
    --green:#6ff5b1;      /* fresh mint */
    --amber:#ffcd6e;      /* soft sunny gold */
    --red:#ff8095;        /* warm coral-pink */
    --violet:#cdb3ff;     /* soft lavender */
    --coral:#ffa388;      /* peachy coral accent */
    --magenta:#ff7acf;    /* warm pink for celebrations */
    --shadow:0 18px 48px rgba(0,0,0,.35);
    --radius:22px;
    --radiusSm:14px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    color:var(--text);
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:
      /* Top-left peach warm glow */
      radial-gradient(circle at 12% 12%, rgba(255,163,136,.14), transparent 32%),
      /* Top-right lavender */
      radial-gradient(circle at 88% 14%, rgba(205,179,255,.13), transparent 30%),
      /* Mid-right cyan pop */
      radial-gradient(circle at 92% 50%, rgba(93,223,255,.14), transparent 32%),
      /* Lower-left mint */
      radial-gradient(circle at 18% 78%, rgba(111,245,177,.12), transparent 30%),
      /* Lower-right warm pink */
      radial-gradient(circle at 82% 88%, rgba(255,122,207,.10), transparent 32%),
      /* Base — lighter dusk-to-sky gradient */
      linear-gradient(180deg, #1d3b5c 0%, var(--bg1) 55%, #081a2c 100%);
    overflow:hidden;
  }
  .bg-waves{
    position:fixed; inset:0; pointer-events:none; overflow:hidden;
  }
  .wave{
    position:absolute; left:-15%; width:130%; height:220px; border-radius:45%;
    background:linear-gradient(180deg, rgba(93,223,255,.10), rgba(255,255,255,0));
    filter:blur(10px);
    animation:drift 16s ease-in-out infinite;
  }
  .wave.w1{bottom:8%; animation-duration:20s; opacity:.55; background:linear-gradient(180deg, rgba(93,223,255,.12), rgba(255,255,255,0));}
  .wave.w2{bottom:0%; animation-duration:28s; opacity:.4; transform:scaleX(1.05); background:linear-gradient(180deg, rgba(205,179,255,.10), rgba(255,255,255,0));}
  .wave.w3{bottom:-6%; animation-duration:34s; opacity:.30; background:linear-gradient(180deg, rgba(111,245,177,.08), rgba(255,255,255,0));}
  @keyframes drift{
    0%,100%{transform:translateX(0) translateY(0)}
    50%{transform:translateX(4%) translateY(-10px)}
  }

  .app{
    position:relative;
    height:100%;
    display:grid;
    grid-template-rows:auto 1fr auto;
    gap:16px;
    padding:18px;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; z-index:2;
  }
  .brand{
    display:flex; align-items:center; gap:14px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--line);
    padding:12px 16px; border-radius:18px; box-shadow:var(--shadow);
    backdrop-filter:blur(10px);
  }
  .brand-icon{
    width:44px; height:44px; border-radius:14px; display:grid; place-items:center;
    background:linear-gradient(180deg, rgba(116,230,255,.18), rgba(182,166,255,.08));
    border:1px solid rgba(116,230,255,.18);
    color:var(--cyan); font-size:24px; text-shadow:0 0 18px rgba(116,230,255,.25);
  }
  .brand h1{
    margin:0; font-size:18px; letter-spacing:.02em;
  }
  .brand малко{color:var(--muted); display:block; margin-top:2px; font-size:12px}
  .top-controls{display:flex; gap:10px; flex-wrap:wrap}
  button, .btn{
    border:1px solid rgba(255,255,255,.14);
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    color:var(--text);
    border-radius:14px;
    padding:12px 16px;
    font:inherit;
    cursor:pointer;
    transition:transform .12s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
  }
  button:hover,.btn:hover{transform:translateY(-1px); border-color:rgba(95,217,255,.45)}
  button:active,.btn:active{transform:translateY(1px)}
  button.primary,.btn.primary{
    background:linear-gradient(135deg, rgba(95,217,255,.30), rgba(196,168,255,.18));
    border-color:rgba(95,217,255,.50);
    color:#f5fbff;
    font-weight:700;
  }
  button.primary:hover,.btn.primary:hover{
    background:linear-gradient(135deg, rgba(95,217,255,.40), rgba(196,168,255,.28));
    border-color:rgba(95,217,255,.75);
    box-shadow:0 0 22px rgba(95,217,255,.25), 0 8px 20px rgba(0,0,0,.20);
  }
  button.success{
    background:linear-gradient(135deg, rgba(92,242,168,.30), rgba(95,217,255,.16));
    border-color:rgba(92,242,168,.45);
    font-weight:700;
  }
  button.success:hover{
    box-shadow:0 0 22px rgba(92,242,168,.25), 0 8px 20px rgba(0,0,0,.20);
  }
  button.warn{
    background:linear-gradient(135deg, rgba(255,198,107,.28), rgba(255,157,122,.14));
    border-color:rgba(255,198,107,.45);
    font-weight:700;
  }
  button.warn:hover{
    box-shadow:0 0 22px rgba(255,198,107,.22), 0 8px 20px rgba(0,0,0,.20);
  }
  button.ghost{
    background:rgba(255,255,255,.03);
  }
  button:disabled{opacity:.5; cursor:not-allowed; transform:none; box-shadow:0 8px 20px rgba(0,0,0,.15) !important}

  main{
    min-height:0;
    display:grid;
    place-items:center;
    z-index:1;
  }
  .screen{
    width:min(1200px, 100%);
    max-height:100%;
    overflow:auto;
    background:linear-gradient(180deg, rgba(8,18,30,.55), rgba(8,18,30,.72));
    border:1px solid var(--line);
    border-radius:28px;
    box-shadow:var(--shadow);
    backdrop-filter:blur(16px);
    padding:28px;
  }
  .hero{
    display:grid;
    grid-template-columns:1.3fr .95fr;
    gap:22px;
    align-items:stretch;
  }

  /* === Home screen art layer === */
  .hero-with-art{
    position:relative;
    isolation:isolate;
  }
  .hero-art{
    position:absolute;
    inset:-30px -30px -20px -30px;
    z-index:-1;
    pointer-events:none;
    overflow:hidden;
    border-radius:32px;
    /* Soft vignette to fade edges and protect text readability */
    -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, rgba(0,0,0,.4) 75%, rgba(0,0,0,0) 100%);
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, rgba(0,0,0,.4) 75%, rgba(0,0,0,0) 100%);
  }
  .hero-art svg{
    width:100%; height:100%;
    /* Subtle drift animation makes the scene feel alive */
    animation: heroArtDrift 30s ease-in-out infinite alternate;
    opacity:0.78;
  }
  .hero-art .hero-sun{
    transform-origin: 640px 135px;
    animation: sunBreathe 6s ease-in-out infinite;
  }
  @keyframes sunBreathe{
    0%,100%{transform: scale(1); opacity: 1;}
    50%{transform: scale(1.06); opacity: 0.92;}
  }
  .hero-art .hero-raft1{
    animation: raftBob1 7s ease-in-out infinite;
    transform-origin: 220px 510px;
  }
  .hero-art .hero-raft2{
    animation: raftBob2 9s ease-in-out infinite;
    transform-origin: 540px 538px;
  }
  @keyframes raftBob1{
    0%,100%{transform: translate(0,0) rotate(0deg);}
    50%{transform: translate(8px, -2px) rotate(-1.2deg);}
  }
  @keyframes raftBob2{
    0%,100%{transform: translate(0,0) rotate(0deg);}
    50%{transform: translate(-6px, -1px) rotate(1.5deg);}
  }
  .hero-art .hero-particles circle,
  .hero-art .hero-particles ellipse{
    animation: particleFloat 7s ease-in-out infinite;
  }
  .hero-art .hero-particles > *:nth-child(2n){animation-duration:9s; animation-delay:1.5s}
  .hero-art .hero-particles > *:nth-child(3n){animation-duration:11s; animation-delay:.7s}
  .hero-art .hero-particles > *:nth-child(5n){animation-duration:8s; animation-delay:2.3s}
  @keyframes heroArtDrift{
    0%   {transform: translate(0px, 0px) scale(1.0);}
    50%  {transform: translate(8px, -4px) scale(1.02);}
    100% {transform: translate(-6px, 3px) scale(1.0);}
  }
  @keyframes particleFloat{
    0%,100%{transform: translate(0,0); opacity:.5;}
    33%    {transform: translate(8px, -10px); opacity:.9;}
    66%    {transform: translate(-6px, -16px); opacity:.55;}
  }

  /* Hero panel itself: slightly more transparent to let the art breathe through behind */
  .hero-panel{
    background: linear-gradient(135deg, rgba(13,28,46,0.88) 0%, rgba(20,42,66,0.92) 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,.13);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.06),
      0 24px 60px rgba(0,0,0,.35);
    position:relative;
    z-index:1;
  }

  /* Hero title with vibrant gradient — the "wow" moment */
  .hero-title{
    background: linear-gradient(135deg, #5fd9ff 0%, #c4a8ff 45%, #ff9d7a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    font-weight: 800;
    letter-spacing: -0.01em;
    margin: 0 0 4px;
    /* Subtle text shadow fallback for non-supporting browsers */
    text-shadow: 0 0 30px rgba(95,217,255,.20);
    animation: titleGlow 5s ease-in-out infinite alternate;
  }
  @keyframes titleGlow{
    0%   {filter: drop-shadow(0 0 0px rgba(95,217,255,0));}
    100% {filter: drop-shadow(0 0 18px rgba(196,168,255,0.35));}
  }
  .hero-subtitle{
    font-size: clamp(18px, 2vw, 24px);
    font-weight: 600;
    color: var(--cyan);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin: 0 0 18px;
    opacity: 0.92;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  }
  .panel.soft{background:rgba(255,255,255,.045)}
  .panel h2,.panel h3,.panel h4{margin:0 0 12px}
  .kicker{
    display:inline-flex; align-items:center; gap:8px;
    color:var(--cyan); font-size:12px; font-weight:700; letter-spacing:.11em; text-transform:uppercase;
    margin-bottom:8px;
  }
  .display-title{
    font-size:clamp(34px, 5vw, 58px);
    line-height:1.02; margin:0 0 14px;
  }
  .lead{
    color:var(--muted);
    font-size:18px; line-height:1.55; max-width:62ch; margin:0 0 18px;
  }
  .tiny{font-size:12px; color:var(--muted)}
  .chips{display:flex; flex-wrap:wrap; gap:10px; margin:14px 0 20px}
  .chip{
    padding:8px 12px; border-radius:999px;
    background:rgba(255,255,255,.05); border:1px solid var(--line); color:var(--muted); font-size:13px;
  }
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .stack{display:grid; gap:14px}
  .stat{
    background:rgba(255,255,255,.04);
    border:1px solid var(--line);
    border-radius:18px;
    padding:16px;
  }
  .stat .label{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em}
  .stat .value{font-size:30px; margin-top:6px; font-weight:800}
  label{display:block; margin-bottom:8px; color:var(--muted); font-size:13px}
  input, select{
    width:100%;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(0,0,0,.18);
    color:var(--text);
    padding:13px 14px;
    font:inherit;
    outline:none;
  }
  input:focus, select:focus{border-color:rgba(116,230,255,.44); box-shadow:0 0 0 3px rgba(116,230,255,.10)}
  .actions{display:flex; gap:12px; flex-wrap:wrap; margin-top:18px}
  .howto{
    display:grid;
    gap:14px;
    color:var(--muted);
    line-height:1.6;
  }
  .howto ol{padding-left:20px; margin:0}
  .howto li{margin:8px 0}
  .round-header{
    display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px;
  }
  .score-strip{
    display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px;
  }
  .team-card{
    background:rgba(255,255,255,.045);
    border:1px solid var(--line);
    border-radius:18px;
    padding:14px;
    min-width:0;
  }
  .team-card h4{margin:0 0 6px; font-size:16px}
  .team-card .meta{display:flex; gap:12px; flex-wrap:wrap; color:var(--muted); font-size:13px}
  .token{
    padding:4px 8px; border-radius:999px; background:rgba(116,230,255,.10); border:1px solid rgba(116,230,255,.22); color:var(--cyan)
  }
  .round-type{
    display:inline-flex; align-items:center; gap:10px;
    padding:10px 14px; border-radius:999px;
    background:rgba(116,230,255,.09); border:1px solid rgba(116,230,255,.22); color:var(--cyan); font-weight:700;
  }
  .доказателства-layout{
    display:grid; grid-template-columns:1.1fr .9fr; gap:18px;
  }
  .list{
    display:grid; gap:10px; padding:0; margin:0;
  }
  .list li{
    list-style:none; padding:11px 13px; border-radius:14px;
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
  }
  .metric-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .metric{
    padding:12px; border-radius:16px; background:rgba(255,255,255,.05); border:1px solid var(--line)
  }
  .metric .m-label{font-size:12px; color:var(--muted)}
  .metric .m-value{font-size:16px; font-weight:700; margin-top:4px}
  .flavor{
    margin-top:16px; color:#d6e9fb; font-style:italic; border-left:3px solid rgba(116,230,255,.3); padding-left:12px;
  }

  /* Glossary terms within доказателства card and questions */
  .gloss-term{
    color: var(--cyan);
    border-bottom: 1px dashed rgba(95,217,255,.55);
    cursor: help;
    text-decoration: none;
    transition: color .15s ease, border-color .15s ease;
  }
  .gloss-term:hover{
    color: #fff;
    border-bottom-color: var(--cyan);
  }
  /* Glossary popover */
  .gloss-pop{
    position: fixed;
    z-index: 90;
    max-width: 320px;
    padding: 14px 16px;
    background: rgba(15, 30, 48, 0.98);
    border: 1px solid rgba(95,217,255,.5);
    border-radius: 14px;
    box-shadow: 0 16px 36px rgba(0,0,0,.55);
    font-size: 13.5px;
    line-height: 1.55;
    color: #f1f7ff;
    pointer-events: auto;
    backdrop-filter: blur(12px);
  }
  .gloss-pop .term{
    display:block;
    color: var(--cyan);
    font-weight: 700;
    margin-bottom: 6px;
    font-size: 14.5px;
  }
  .gloss-pop .close-x{
    position: absolute;
    top: 8px; right: 10px;
    background: transparent; border: 0;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  .gloss-pop .close-x:hover{ color: #fff; }

  /* Glossary panel button */
  .gloss-btn{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 14px;
    background: rgba(95,217,255,.10);
    border: 1px solid rgba(95,217,255,.30);
    color: var(--cyan);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s ease;
  }
  .gloss-btn:hover{
    background: rgba(95,217,255,.18);
  }

  /* Round illustration banner — top of доказателства card */
  .round-illustration{
    width: 100%;
    height: 180px;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 18px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.10), 0 8px 22px rgba(0,0,0,.25);
    position: relative;
  }
  .round-illustration::after{
    /* Subtle bottom fade to ease into the panel */
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50px;
    background: linear-gradient(to top, rgba(13,28,46,0.45), transparent);
    pointer-events: none;
  }
  .round-illustration svg{
    width: 100%; height: 100%; display: block;
  }
  @media (max-width: 760px){
    .round-illustration{ height: 140px; }
  }
  .roll-stage{
    display:grid; place-items:center; gap:20px; min-height:340px; text-align:center;
  }
  .die-wrap{perspective:900px}
  .die{
    width:138px; height:138px; border-radius:26px;
    display:grid; place-items:center;
    background:linear-gradient(180deg, rgba(116,230,255,.20), rgba(182,166,255,.10));
    border:1px solid rgba(116,230,255,.34);
    box-shadow:0 0 42px rgba(116,230,255,.10), inset 0 0 18px rgba(255,255,255,.05);
    font-size:62px;
    transform-style:preserve-3d;
  }
  .die.rolling{animation:spin 1.8s cubic-bezier(.2,.75,.2,1)}
  @keyframes spin{
    0%{transform:rotateX(0deg) rotateY(0deg)}
    30%{transform:rotateX(250deg) rotateY(210deg)}
    60%{transform:rotateX(520deg) rotateY(470deg)}
    100%{transform:rotateX(720deg) rotateY(690deg)}
  }
  .type-name{font-size:28px; font-weight:800}
  .subtle{color:var(--muted)}
  .decision-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
  }
  .submit-card{
    position:relative;
    background:rgba(255,255,255,.04);
    border:1px solid var(--line);
    border-radius:18px;
    padding:16px;
  }
  .status-pill{
    display:inline-flex; align-items:center; gap:8px; padding:6px 10px;
    border-radius:999px; font-size:12px; font-weight:700; margin-bottom:10px;
    background:rgba(255,255,255,.06);
  }
  .status-pending{color:var(--amber); border:1px solid rgba(255,209,126,.22)}
  .status-done{color:var(--green); border:1px solid rgba(125,242,180,.22)}
  .question{
    padding:14px;
    border-radius:18px;
    background:rgba(255,255,255,.035);
    border:1px solid var(--line);
  }
  .q-title{font-weight:700; margin-bottom:12px}
  .options{display:grid; gap:10px}
  .option{
    position:relative;
    display:flex; gap:10px; align-items:flex-start;
    padding:12px 12px 12px 44px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(255,255,255,.03);
    cursor:pointer;
    transition:border-color .16s ease, background .16s ease, transform .12s ease;
  }
  .option:hover{border-color:rgba(116,230,255,.33); transform:translateY(-1px)}
  .option input{position:absolute; opacity:0; pointer-events:none}
  .option .mark{
    position:absolute; left:12px; top:12px; width:22px; height:22px; border-radius:50%;
    border:1px solid rgba(255,255,255,.20); display:grid; place-items:center; color:transparent;
    background:rgba(0,0,0,.16);
  }
  .option.selected{
    background:rgba(116,230,255,.10);
    border-color:rgba(116,230,255,.40);
  }
  .option.selected .mark{
    color:var(--cyan); border-color:rgba(116,230,255,.42);
    box-shadow:0 0 0 4px rgba(116,230,255,.08);
  }
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(2,8,14,.62); backdrop-filter:blur(6px); z-index:15;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .modal-backdrop.show{display:flex}
  .modal{
    width:min(930px, 100%);
    max-height:92vh;
    overflow:auto;
    background:linear-gradient(180deg, rgba(8,20,32,.96), rgba(8,20,32,.98));
    border:1px solid var(--line);
    border-radius:28px; box-shadow:var(--shadow); padding:24px;
  }
  .modal-header{
    display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:18px;
  }
  .timer{
    min-width:120px;
    text-align:center;
    padding:12px 14px; border-radius:16px;
    background:rgba(255,255,255,.05); border:1px solid var(--line);
    transition: background .25s ease, border-color .25s ease;
  }
  .timer .num{
    font-size:28px; font-weight:800;
    transition: color .25s ease, transform .15s ease;
    color: var(--text);
  }
  .timer .num.timer-warn{
    color: var(--amber);
    animation: timerPulseWarn 1s ease-in-out infinite;
  }
  .timer .num.timer-critical{
    color: var(--red);
    animation: timerPulseCrit .5s ease-in-out infinite;
  }
  .timer .num.timer-up{
    color: var(--red);
    animation: timerUpShake .35s ease 0s 2;
    transform: scale(1.15);
  }
  @keyframes timerPulseWarn{
    0%,100%{transform: scale(1)}
    50%{transform: scale(1.06); text-shadow: 0 0 16px rgba(255,198,107,.45)}
  }

    box-shadow:0 0 0 0 rgba(125,242,180,.35);
    animation:hintPulse 2.6s ease-in-out infinite;
  }

  .hint-btn .lamp{display:inline-block; transform:translateY(-1px)}

    margin:4px 0 14px;
    padding:12px 14px;
    border-radius:14px;
    background:linear-gradient(180deg, rgba(125,242,180,.10), rgba(125,242,180,.04));
    border:1px solid rgba(125,242,180,.28);
    color:#dff6ea;
    font-size:13.5px; line-height:1.55;
    animation:hintSlide .35s ease;
  }
  .hint-reveal strong{color:var(--green); font-weight:700}
  @keyframes hintSlide{
    from{opacity:0; transform:translateY(-4px)}
    to{opacity:1; transform:translateY(0)}
  }
  /* Серия / momentum chip */
  .серия-row{
    display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;
  }
  .streak-chip{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 10px; border-radius:999px;
    background:rgba(255,255,255,.05); border:1px solid var(--line);
    font-size:12px; color:var(--muted);
  }
  .streak-chip.hot{
    background:linear-gradient(90deg, rgba(255,209,126,.18), rgba(255,133,133,.12));
    border-color:rgba(255,209,126,.40);
    color:#ffe4b3;
    box-shadow:0 0 12px rgba(255,209,126,.18);
  }
  .streak-chip .flame{font-size:13px}
  .perfect-значка{
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 10px; border-radius:999px;
    background:rgba(116,230,255,.10); border:1px solid rgba(116,230,255,.35);
    color:var(--cyan); font-size:12px; font-weight:700; letter-spacing:.04em;
    margin-left:6px;
  }
  /* Reading-the-data tip box on the доказателства screen */
  .reading-tip{
    margin:12px 0 18px;
    padding:12px 14px;
    border-radius:14px;
    background:linear-gradient(180deg, rgba(116,230,255,.06), rgba(116,230,255,.02));
    border:1px solid rgba(116,230,255,.22);
    color:#dff0fb;
    font-size:13.5px; line-height:1.55;
  }
  .reading-tip strong{color:var(--cyan); font-weight:700}
  .reading-tip em{color:#cfe7ff; font-style:italic}

  /* Persona picker */
  .team-setup-row{display:flex; flex-direction:column; gap:6px}

    width:100%;
    padding:10px 12px;

    border:1px solid var(--line);
    border-radius:12px;
    color:var(--text);
    font-size:14px;
    font-family:inherit;
    /* Critical: force native arrow visibility on dark bg */
    background-image: linear-gradient(45deg, transparent 50%, var(--cyan) 50%),
                      linear-gradient(135deg, var(--cyan) 50%, transparent 50%);
    background-position: calc(100% - 18px) 50%, calc(100% - 12px) 50%;
    background-size: 6px 6px, 6px 6px;
    background-repeat: no-repeat;

    -moz-appearance: none;

    cursor:pointer;

  }
  .persona-select:hover{

    background-color: rgba(95,217,255,.06);
  }
  .persona-select:focus{outline:2px solid var(--green); outline-offset:1px}

     force dark bg + light text so the dropdown is readable on every browser */
  .persona-select option{
    background-color:#0e2237;
    color:#edf6ff;
    padding:8px;
  }
  .persona-select option:checked,
  .persona-select option:hover{
    background-color:#1a3a5a;
    color:#5fd9ff;
  }
  .hidden-when-preset{display:none !important}
  /* When the input is shown for custom names */
  input.hidden-when-preset:not(.hidden-when-preset){
    display:block !important;
  }

  /* Achievement medals on result screen */
  .medals-row{
    display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;
  }
  .medal{
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 10px; border-radius:999px;
    background:linear-gradient(135deg, rgba(255,209,126,.16), rgba(255,133,133,.10));
    border:1px solid rgba(255,209,126,.42);
    color:#ffe9c2; font-size:11.5px; font-weight:700; letter-spacing:.04em;
  }
  .medal .ico{font-size:13px}

  /* Reaction beat under team result */
  .reaction-beat{
    margin-top:8px;

    color:#bcd4e0;
    font-style:italic;
    opacity:.85;
  }
  /* Team icon next to name */
  .team-icon{
    display:inline-block;
    margin-right:6px;
    font-size:1em;
  }
  .resolution-grid{
    display:grid; grid-template-columns:1.05fr .95fr; gap:18px;
  }
  .answer-key-item{
    padding:14px;

  }

  .answer-correct{
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(111,245,177,.10);
    border: 1px solid rgba(111,245,177,.30);
    color: #d6f7e4;
    margin-top: 6px;
  }
  .answer-correct .check-mark{
    color: var(--green);
    font-weight: 800;
    font-size: 17px;
    line-height: 1.3;
  }
  .simple-exp{
    margin-top: 10px;
    padding: 12px 14px;
    border-radius: 12px;
    background: rgba(95,217,255,.08);
    border-left: 3px solid var(--cyan);
    color: #e6f3fb;
    font-size: 13.5px;
    line-height: 1.6;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .simple-exp .exp-icon{
    font-size: 18px;
    flex: 0 0 auto;
    line-height: 1.3;
  }
  .simple-exp strong{
    color: var(--cyan);
    font-weight: 700;
  }
  .hint-recap{
    margin-top:10px;
    padding:10px 12px;
    border-radius:12px;
    background:rgba(125,242,180,.07);
    border:1px dashed rgba(125,242,180,.30);
    color:#cdf5e0;
    font-size:13px; line-height:1.5;
  }
  .hint-recap .lamp{margin-right:4px}
  .hint-recap em{color:var(--green); font-style:normal; font-weight:600}
  .result-team{
    border-radius:18px; border:1px solid var(--line); background:rgba(255,255,255,.04); padding:16px; margin-bottom:12px;
  }
  .gain{font-size:28px; font-weight:800}
  .gain.positive{color:var(--green)}
  .table{
    width:100%; border-collapse:collapse; font-size:14px;
  }
  .table th,.table td{padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.08); text-align:left}
  .table th{color:var(--muted); font-weight:600}
  footer{
    z-index:2;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    color:var(--muted); font-size:13px;
  }
  .footer-note{
    background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:14px; padding:10px 12px;
  }
  .hidden{display:none !important}
  .center{text-align:center}
  .big-score{
    font-size:80px; font-weight:900; line-height:1; margin:4px 0 12px;
    background:linear-gradient(180deg, #fff, #9beeff);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .winner{
    padding:20px; border-radius:24px; background:linear-gradient(180deg, rgba(125,242,180,.13), rgba(116,230,255,.08));
    border:1px solid rgba(125,242,180,.28);
  }

  /* === FINAL SCREEN — fireworks, tier system, high scores === */
  .final-panel{
    position: relative;
    overflow: visible;
  }
  .fireworks-canvas{
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 50;
  }

  /* New high score banner */
  .new-highscore-banner{
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    margin: 0 0 18px;
    border-radius: 16px;
    background: linear-gradient(90deg, rgba(255,205,110,.20), rgba(205,179,255,.18), rgba(95,217,255,.14));
    border: 1px solid rgba(255,205,110,.45);
    color: #fff5d8;
    font-size: 15px;
    line-height: 1.5;

    z-index: 2;

  .new-highscore-banner.absolute{

  }
  @keyframes hsIconBounce{
    0%,100% { transform: translateY(0) rotate(0deg); }

    75%     { transform: translateY(-4px) rotate(6deg); }

  /* Tier значка */
  .tier-значка{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px 6px 12px;
    border-radius: 999px;
    border: 1px solid;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .tier-значка .tier-emoji{

  }
  .tier-message{
    max-width: 700px;
    margin: 18px auto 0;
    padding: 14px 18px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    color: #e6f3fb;
    font-size: 14.5px;
    line-height: 1.65;
    text-align: left;
  }

  /* High score table — current run highlight */
  .highscore-current{
    background: linear-gradient(90deg, rgba(255,205,110,.14), rgba(255,205,110,.04));
  }
  .highscore-current td{
    color: #ffe9c2 !important;
    font-weight: 700;
  }
  .hs-now{
    color: var(--amber);
    font-size: 11px;
    font-weight: 600;
    margin-left: 4px;
  }
  .hs-clear-btn{
    margin-left: 10px;
    padding: 4px 12px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 11px;
    border-radius: 8px;
    cursor: pointer;
  }
  .hs-clear-btn:hover{
    background: rgba(255,128,149,.10);
    border-color: rgba(255,128,149,.40);
    color: var(--red);
  }

  .narration{
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(116,230,255,.20);
    background:linear-gradient(180deg, rgba(116,230,255,.07), rgba(255,255,255,.02));
    color:#dfefff; line-height:1.7;
  }
  .pill-row{display:flex; flex-wrap:wrap; gap:10px}
  .caption{font-size:12px; color:var(--muted); margin-top:6px}
  .helper{color:var(--muted); line-height:1.55}
  @media (max-width: 980px){
    .hero,.доказателства-layout,.resolution-grid{grid-template-columns:1fr}
    .decision-grid,.score-strip,.grid3,.grid2{grid-template-columns:1fr}
    .screen{padding:18px}
    header,.round-header,footer{flex-direction:column; align-items:flex-start}
  }
</style>
</head>
<body>
<div class="bg-waves" aria-hidden="true">
  <div class="wave w1"></div>
  <div class="wave w2"></div>

</div>

<div class="app">
  <header>
    <div class="brand">
      <div class="brand-icon">◈</div>
      <div>
        <h1>Води под натиск: Пазители на живо</h1>
        <малко>Прочетете доказателствата. Вземете решение. Защитете водата.</малко>

  <main>

  </main>

  <footer>
    <div class="footer-note">Прототипна версия: изчистен вариант в един файл. Напълно годна за игра. Най-подходяща за класна стая с общ екран или за онлайн водена игра.</div>

</div>

<div id="modalBackdrop" class="modal-backdrop" aria-hidden="true">

</div>

<script>
(() => {
  const TYPES = {

  const ROUNDS = [

      flavor: "Водата дава обратна връзка. И тя не е деликатна.",

      questions: [

  // ============================================================
  // PERFORMANCE TIERS — based on percentage of max possible score
  // Each round has 8 possible points (2+2+3+1) × 6 rounds = 48 max.
  // Tiers are computed against this maximum.
  // ============================================================
  const PERFORMANCE_TIERS = [
    { min: 0.95, label: "Легенда на водосбора",     emoji: "🏆", color: "#ffd97a",

      celebration: "малко" }
  ];
  function getPerformanceTier(score, maxPossible){
    const pct = score / maxPossible;
    return PERFORMANCE_TIERS.find(t => pct >= t.min) || PERFORMANCE_TIERS[PERFORMANCE_TIERS.length - 1];
  }

  // ============================================================
  // HIGH SCORE — local storage with optional cloud sync
  // localStorage key: "wuP_highscores" → array of { name, icon, score, date }
  // ============================================================
  const HIGHSCORE_KEY = "wuP_highscores_v1";
  function loadHighScores(){
    try {
      const raw = localStorage.getItem(HIGHSCORE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }
  function saveHighScore(entry){
    try {
      const list = loadHighScores();
      list.push(entry);
      list.sort((a, b) => b.score - a.score);
      // Keep top 20
      const top = list.slice(0, 20);
      localStorage.setItem(HIGHSCORE_KEY, JSON.stringify(top));
      return top;
    } catch(e) { return []; }
  }
  function clearHighScores(){
    try { localStorage.removeItem(HIGHSCORE_KEY); } catch(e) {}
  }

  const GLOSSARY = {
    "Мътност": "Колко мътна изглежда водата. Високата мътност означава много дребни частици (кал, почва, органична материя), плаващи във водата — обикновено заради дъжд, отток или разбъркване на дъното.",
    "Разтворен кислород": "Количество кислороден газ, разтворен във водата. Рибите и другите живи организми се нуждаят от него за дишане. Ако е твърде нисък, рибите плуват близо до повърхността (както се вижда в данните) или умират.",
    "pH": "Показва колко киселинна или основна (алкална) е водата. Скалата е от 0 до 14, като 7 е неутрално. Повечето природни води са между 6,5 и 8,5. Големи промени означават замърсяване.",
    "Нитрати": "Химично вещество (NO₃), съдържащо азот. Растенията го използват като хранително вещество. Твърде много нитрати във водата — обикновено от торове или отпадъчни води — карат водораслите да растат прекалено бързо и лишават рибите от кислород.",
    "Фосфати": "Химично вещество (PO₄), съдържащо фосфор. Подобно на нитратите, то е хранително вещество, което подхранва водораслите. Среща се в торове, препарати и непречистени отпадъчни води.",
    "Електропроводимост": "Показва колко добре водата провежда електричество. По-висока електропроводимост означава повече разтворени соли и минерали. Внезапна промяна може да означава солно замърсяване или индустриален разряд.",
    "Брой отпадъци": "Просто измерване: колко парчета отпадък се намират в фиксирана площ или за фиксирано време. Полезно за проследяване на промени и откриване на горещи точки.",
    "E. coli": "Вид бактерия, която живее в червата на хора и животни. Намирането ѝ във водата означава замърсяване с отпадъчни води — и вероятно други болестотворни микроби.",
    "Еутрофикация": "Когато водата получи твърде много хранителни вещества (нитрати и фосфати) и се развият толкова водорасли, че блокират светлината и изразходват кислорода. Рибите умират. Водата става зелена или мътна.",
    "Цъфтеж на водорасли": "Внезапно бурно развитие на водорасли, често видимо като зелени/червени/кафяви петна по повърхността. Причинява се от топла вода + допълнителни хранителни вещества. Някои цъфтежи произвеждат токсини.",
    "Повърхностен отток": "Вода, която тече по земната повърхност (вместо да попива) — обикновено след дъжд. Поема почва, тор, масло и отпадъци и ги отвежда до най-близката шахта или поток.",
    "Преливане на канализацията": "Когато количеството дъжд претовари канализационната система, непречистени отпадъчни води се изливат в реки или море. Носят опасни бактерии — невидими, но реален риск за общественото здраве.",
    "Водосбор": "Цялата територия, чиито валежи се оттичат към една и съща река или море. Това, което става нагоре (градове, ферми), влияе на това надолу (естуар, крайбрежие).",
    "Естуар": "Мястото, където реката се среща с морето. Смес от сладка и солена вода. Много продуктивно за дивата природа — и много чувствително към замърсяване отгоре.",
    "Приток": "По-малък поток или река, която се влива в по-голяма. Замърсяването в приток става замърсяване в главната река.",
    "Пропусклива повърхност": "Повърхност, която позволява на дъждовната вода да попива (трева, чакъл, специални плочи). Обратното е бетон или асфалт, които насочват целия дъжд към шахтите.",
    "Събиране на дъждовна вода": "Системи, които събират и съхраняват дъждовна вода (варели, зелени покриви, инфилтрационни басейни), вместо да я оставят да се оттича в шахтите.",
    "Стопанисване": "Отговорна грижа за ресурс (вода, земя, оборудване) — управление така, че да остане здрав в дългосрочен план.",
    "Навлизане на солени води": "Когато солена морска вода навлиза в сладководна река или водоносен пласт. Обикновено е проблем за крайбрежни райони или места с малко валежи.",

  // SCENARIO SELECTION — when a mission starts, pick 6 scenarios.
  // 1 from each "slot" (slot = original ROUNDS index 0..5), choosing
  // either the canonical scenario or one of the EXTRA scenarios that
  // shares the same "type" (which determines the slot's identity).
  //
  // The dice is genuine: each playthrough is different.
  //   - slot 0 (Field Test, EASY)        → pool of canonical R1 + easy[0] (Field Test)
  //   - slot 1 (Pollution Alert, EASY)   → pool of canonical R2 + easy[1] (Pollution Alert)
  //   - slot 2 (Rapid Response, MEDIUM)  → pool of canonical R3 + medium[0]
  //   - slot 3 (Community Message, MED)  → pool of canonical R4 + medium[1]
  //   - slot 4 (Cross-Border, HARD)      → pool of canonical R5 + hard[0]
  //   - slot 5 (Policy Window, HARD)     → pool of canonical R6 + hard[1]
  // ============================================================
  function pickActiveRounds(){
    const slots = [
      { canonical: ROUNDS[0], extras: EXTRA_SCENARIOS.easy.filter(s => s.type === 'Полеви тест') },
      { canonical: ROUNDS[1], extras: EXTRA_SCENARIOS.easy.filter(s => s.type === 'Сигнал за замърсяване') },
      { canonical: ROUNDS[2], extras: EXTRA_SCENARIOS.medium.filter(s => s.type === 'Бърза реакция') },
      { canonical: ROUNDS[3], extras: EXTRA_SCENARIOS.medium.filter(s => s.type === 'Съобщение към общността') },
      { canonical: ROUNDS[4], extras: EXTRA_SCENARIOS.hard.filter(s => s.type === 'Трансгранична връзка') },
      { canonical: ROUNDS[5], extras: EXTRA_SCENARIOS.hard.filter(s => s.type === 'Политически прозорец') }
    ];
    return slots.map(slot => {
      const pool = [slot.canonical, ...slot.extras];
      return pool[Math.floor(Math.random() * pool.length)];
    });
  }

  // Returns the active scenario for the current round.
  // Falls back to ROUNDS array if activeRounds hasn't been initialized
  // (e.g. running an older saved-state path).
  function getCurrentRound(){
    if (state.activeRounds && state.activeRounds[state.roundIndex]){
      return state.activeRounds[state.roundIndex];
    }
    return ROUNDS[state.roundIndex];
  }

  // Returns the hint array for the current scenario.
  // For canonical scenarios, looks up by index. For extras, by title.
  function getCurrentHints(){
    const round = getCurrentRound();
    if (!round) return [];
    // Look up by title in EXTRA_HINTS first
    if (EXTRA_HINTS[round.title]) return EXTRA_HINTS[round.title];
    // Otherwise it's a canonical scenario — use its index
    const idx = ROUNDS.indexOf(round);
    if (idx >= 0 && ROUNDS_HINTS[idx]) return ROUNDS_HINTS[idx];
    return [];
  }

  // Returns the illustration SVG markup for the current scenario.
  function getCurrentIllustration(){
    const round = getCurrentRound();
    if (!round) return '';
    if (EXTRA_ILLUSTRATIONS[round.title]) return EXTRA_ILLUSTRATIONS[round.title];
    const idx = ROUNDS.indexOf(round);
    if (idx >= 0 && ROUND_ILLUSTRATIONS[idx]) return ROUND_ILLUSTRATIONS[idx];
    return '';
  }

  function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  }

  // Wrap any glossary term found in `text` (already-escaped) with a clickable span.
  // Called for доказателства-card text and data labels. Each term is wrapped only the
  // first time it appears in a given block (to avoid noise).
  function glossarize(text){
    if (!text) return text;
    let out = String(text);
    const used = new Set();
    // Sort terms by length DESCENDING so longer phrases match before shorter ones
    const terms = Object.keys(GLOSSARY).sort((a,b) => b.length - a.length);
    for (const term of terms){
      if (used.has(term)) continue;
      // Word-boundary match, case-insensitive, only first occurrence
      const safeTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp('\\b(' + safeTerm + ')\\b', 'i');
      const match = out.match(re);
      if (match){
        used.add(term);
        out = out.replace(re, `<span class="gloss-term" data-term="${escapeHtml(term)}" tabindex="0">$1</span>`);
      }
    }
    return out;
  }

  // Show a popover with the glossary definition for the given term
  function showGlossPopover(termEl){
    closeGlossPopover();
    const term = termEl.dataset.term;
    const def = GLOSSARY[term];
    if (!def) return;
    const pop = document.createElement('div');
    pop.className = 'gloss-pop';
    pop.id = 'glossPop';
    pop.innerHTML = `
      <button class="close-x" aria-label="Close">×</button>
      <span class="term">${escapeHtml(term)}</span>
      <div>${escapeHtml(def)}</div>
    `;
    document.body.appendChild(pop);
    // Position near the clicked term
    const rect = termEl.getBoundingClientRect();
    const popRect = pop.getBoundingClientRect();
    let left = rect.left + rect.width/2 - popRect.width/2;
    let top  = rect.bottom + 8;
    // Clamp to viewport
    left = Math.max(10, Math.min(left, window.innerWidth - popRect.width - 10));
    if (top + popRect.height > window.innerHeight - 10){
      top = rect.top - popRect.height - 8;
    }
    pop.style.left = left + 'px';
    pop.style.top  = top + 'px';
    pop.querySelector('.close-x').onclick = closeGlossPopover;
  }
  function closeGlossPopover(){
    const existing = document.getElementById('glossPop');
    if (existing) existing.remove();
  }
  // Global click delegation: open popover on .gloss-term, close on outside click
  document.addEventListener('click', (e) => {
    const term = e.target.closest('.gloss-term');
    if (term){
      e.stopPropagation();
      showGlossPopover(term);
      return;
    }
    if (!e.target.closest('.gloss-pop')) closeGlossPopover();
  });

  function tone(freq=440, dur=0.12, type='sine', gain=0.02, when=0){
    if(!state.audioEnabled || !state.soundUnlocked || !state.audioCtx) return;
    const ctx = state.audioCtx;
    const t0 = ctx.currentTime + when;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  function noiseBurst(dur=0.2, gain=0.01){
    if(!state.audioEnabled || !state.soundUnlocked || !state.audioCtx) return;
    const ctx = state.audioCtx;
    const buffer = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<data.length;i++){ data[i] = (Math.random()*2-1) * (1 - i/data.length); }
    const src = ctx.createBufferSource();
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 1200;
    const g = ctx.createGain();
    g.gain.value = gain;
    src.buffer = buffer;
    src.connect(filter).connect(g).connect(ctx.destination);
    src.start();
  }

  // Sliding pitch tone — perfect for sad-trombone effects
  function slideTone(startFreq, endFreq, dur=0.6, type='sawtooth', gain=0.025, when=0){
    if(!state.audioEnabled || !state.soundUnlocked || !state.audioCtx) return;
    const ctx = state.audioCtx;
    const t0 = ctx.currentTime + when;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(startFreq, t0);
    osc.frequency.exponentialRampToValueAtTime(Math.max(40, endFreq), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

        const sync = () => {
          if (sel.value === '__custom__'){
            nameInput.classList.remove('hidden-when-preset');
            nameInput.value = '';
            nameInput.placeholder = 'Име на отбора…';
            nameInput.focus();
            iconInput.value = '🌐';
          } else {
            nameInput.classList.add('hidden-when-preset');
            nameInput.value = sel.value;
            const opt = sel.options[sel.selectedIndex];
            iconInput.value = opt.dataset.icon || '🌊';
          }
        };
        sel.addEventListener('change', () => { playClick(); sync(); });
        // Initialize hidden-by-default state
        if (sel.value !== '__custom__') nameInput.classList.add('hidden-when-preset');
      });
    }
    wirePersonaPickers();

    document.getElementById('backHomeBtn').onclick = () => { playClick(); resetGame(); };

      unlockAudio();

      const teams = [];

        const customName = (document.getElementById(`teamName${i}`)?.value || '').trim();
        const isCustom = sel && sel.value === '__custom__';
        const name = isCustom ? (customName || `Team ${String.fromCharCode(65+i)}`) : (sel ? sel.value : `Team ${String.fromCharCode(65+i)}`);

        teams.push({
          id:i,
          name: name,
          icon: icon,
          score:0,
          tokens:2,
          tokensEverUsed:0,
          perfectRounds:0,
          correctDiagnosisss:0,
          correctAction:0,
          correctEvidence:0,
          correctCivic:0,
          streak:0,
          bestStreak:0,
          hintFreeRounds:0,
          totalHintsUsed:0,
          fastLocks:0,
          medals:[]
        });
      }
      state.teams = teams;
      state.roundIndex = 0;
      state.submissions = {};
      state.activeRounds = pickActiveRounds();
      renderOpening();
    };
  }

    const die = document.getElementById('die');
    const spinTimer = setInterval(() => {
      const t = TYPES[seq[idx % seq.length]];

      existing.hintsUsed = Array(N).fill(false).map((_, i) => !!old[i]);

    function renderExtraClue(){

      });
    });

    // Hint button handlers — free, one per question, no penalty
    document.querySelectorAll('.hint-btn').forEach(btn => {
      btn.onclick = () => {
        const qi = Number(btn.dataset.hint);
        if(existing.hintsUsed[qi]) return;
        existing.hintsUsed[qi] = true;
        const reveal = document.getElementById(`hintReveal${qi}`);
        if(reveal) reveal.style.display = 'block';

      state.submissions[teamId] = { answers, usedClue: existing.usedClue, hintsUsed: existing.hintsUsed.slice(), fastLock };

    // Proportional warning thresholds: warn when ~30% remains, critical when ~15% remains.

    const warnAt = Math.max(8, Math.round(initialTime * 0.30));
    const critAt = Math.max(5, Math.round(initialTime * 0.15));

    state.timer = setInterval(() => {
      state.timeLeft -= 1;
      const timerEl = document.getElementById('modalTimerNum');
      if(timerEl){
        timerEl.textContent = String(state.timeLeft);
        if (state.timeLeft <= critAt){
          timerEl.classList.add('timer-critical');
          timerEl.classList.remove('timer-warn');
        } else if (state.timeLeft <= warnAt){
          timerEl.classList.add('timer-warn');
          timerEl.classList.remove('timer-critical');
        } else {
          timerEl.classList.remove('timer-warn','timer-critical');
        }
      }
      if (state.timeLeft <= critAt && state.timeLeft > 0) playTick(true);
      else if (state.timeLeft <= warnAt && state.timeLeft > 0) playTick(false);
      if(state.timeLeft <= 0){
        clearTimer();
        playTimeUp();
        const answers = collectModalAnswers(round.questions.length);
        state.submissions[teamId] = { answers, usedClue: existing.usedClue, hintsUsed: existing.hintsUsed.slice() };
        if (timerEl){ timerEl.textContent = "0"; timerEl.classList.add('timer-up'); }
        setTimeout(() => {
          closeModal();
          renderDecisionHub();
        }, 1200);
      }
    }, 1000);
  }

  function collectModalAnswers(count){
    const answers = [];
    for(let i=0;i<count;i++){
      const checked = el.modal.querySelector(`input[name="q${i}"]:checked`);
      answers.push(checked ? Number(checked.value) : null);
    }
    return answers;
  }

  function saveDraftAnswers(teamId, existing){
    const answers = collectModalAnswers(getCurrentRound().questions.length);
    const anyHints = (existing.hintsUsed || []).some(h => h);
    state.submissions[teamId] = (existing.usedClue || anyHints || answers.some(a => a !== null))
      ? { answers, usedClue: existing.usedClue, hintsUsed: (existing.hintsUsed || []).slice(), draft:true }
      : undefined;
    if(state.submissions[teamId] && state.submissions[teamId].draft){
      delete state.submissions[teamId];
    }
  }

    state.currentModalTeam = null;

  function computeRound(){
    const round = getCurrentRound();
    if(!state.allRoundResults) state.allRoundResults = {};
    state.allRoundResults[state.roundIndex] = {};
    state.teams.forEach(team => {
      const submission = state.submissions[team.id] || { answers: [] };
      let gain = 0;
      const detail = round.questions.map((q, i) => {
        const correct = submission.answers[i] === q.correct;
        if(correct) gain += q.points;
        if(i===0 && correct) team.correctDiagnosisss += 1;
        if(i===1 && correct) team.correctEvidence += 1;
        if(i===2 && correct) team.correctAction += 1;
        if(i===3 && correct) team.correctCivic += 1;
        return { correct, answer: submission.answers[i], correctIndex: q.correct, points: q.points };
      });
      team.score += gain;
      const isPerfect = gain === 8;
      if(isPerfect) team.perfectRounds += 1;
      // streak: consecutive perfect (8/8) rounds. Resets on any miss.
      if(isPerfect){
        team.streak += 1;
        if(team.streak > team.bestStreak) team.bestStreak = team.streak;
      } else {
        team.streak = 0;
      }
      // hint-free badge: perfect round AND no hints used
      const hintsUsed = (submission.hintsUsed || []).some(h => h);
      const hintFreePerfect = isPerfect && !hintsUsed;
      if(hintFreePerfect) team.hintFreeRounds += 1;
      // Aggregate counters for end-game medals
      const hintsUsedThisRound = (submission.hintsUsed || []).filter(h => h).length;
      team.totalHintsUsed += hintsUsedThisRound;
      if(submission.usedClue) team.tokensEverUsed += 1;
      if(submission.fastLock) team.fastLocks += 1;
      submission.gain = gain;
      submission.detail = detail;
      submission.isPerfect = isPerfect;
      submission.hintsUsedAny = hintsUsed;
      submission.hintFreePerfect = hintFreePerfect;
      submission.reaction = pickReaction(gain);
      // Snapshot for medal history
      state.allRoundResults[state.roundIndex][team.id] = {
        gain, isPerfect, hintsUsedAny: hintsUsed, hintFreePerfect,
        reaction: submission.reaction
      };
    });
  }

  // ============================================================
  // FIREWORKS — canvas particle engine for the spectacular finale
  // Three layered systems running together:
  //   • Confetti rain (slow drift, varied colors)
  //   • Burst fireworks (explosions at random points)
  //   • Sparkle stars (twinkling background dots)
  // ============================================================
  function startFireworks(opts={}){
    const intensity = opts.intensity || 'зрелищно'; // small | medium | big | spectacular
    const canvas = document.getElementById('fireworksCanvas');
    if (!canvas) return null;
    const ctx = canvas.getContext('2d');
    function resize(){
      canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
      canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
      ctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
    }
    resize();
    const onResize = () => resize();
    window.addEventListener('resize', onResize);

    const colors = ['#5ddfff','#6ff5b1','#ffcd6e','#ff8095','#cdb3ff','#ffa388','#ff7acf','#ffd97a','#fff'];

    // Particle pool
    const particles = [];
    const confetti = [];
    const sparkles = [];

    // Emit a burst at (x, y)
    function burst(x, y, count, baseColor){
      const colorChoice = baseColor || colors[Math.floor(Math.random() * colors.length)];
      for (let i = 0; i < count; i++){
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
        const speed = 3 + Math.random() * 4;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.012 + Math.random() * 0.012,
          color: Math.random() < 0.6 ? colorChoice : colors[Math.floor(Math.random() * colors.length)],
          size: 2 + Math.random() * 2.5,
          gravity: 0.06,
          drag: 0.98
        });
      }
    }

    // Initial bursts (staggered)
    const config = {
      spectacular: { initialBursts: 6, ongoingInterval: 800, confettiRate: 0.7, duration: 12000 },
      big:         { initialBursts: 4, ongoingInterval: 1100, confettiRate: 0.5, duration: 9000 },
      medium:      { initialBursts: 3, ongoingInterval: 1500, confettiRate: 0.35, duration: 7000 },
      small:       { initialBursts: 2, ongoingInterval: 2200, confettiRate: 0.2, duration: 5000 }
    }[intensity];

    const w = () => canvas.width / (window.devicePixelRatio || 1);
    const h = () => canvas.height / (window.devicePixelRatio || 1);

    // Initial burst sequence
    for (let i = 0; i < config.initialBursts; i++){
      setTimeout(() => {
        const x = w() * (0.15 + Math.random() * 0.7);
        const y = h() * (0.20 + Math.random() * 0.40);
        burst(x, y, 36 + Math.floor(Math.random() * 12));
        // Try to play a fanfare on each major burst
        if (typeof playPerfectFanfare === 'function') playPerfectFanfare();
      }, i * 350);
    }

    // Ongoing burst loop
    const burstTimer = setInterval(() => {
      const x = w() * (0.10 + Math.random() * 0.80);
      const y = h() * (0.15 + Math.random() * 0.45);
      burst(x, y, 28 + Math.floor(Math.random() * 14));
    }, config.ongoingInterval);

    // Sparkle stars (decorative background)
    for (let i = 0; i < 24; i++){
      sparkles.push({
        x: Math.random() * w(),
        y: Math.random() * h(),
        size: 1 + Math.random() * 1.5,
        twinklePhase: Math.random() * Math.PI * 2,
        color: colors[Math.floor(Math.random() * colors.length)]
      });
    }

    let running = true;
    let frameId = null;
    function frame(){
      if (!running) return;
      ctx.clearRect(0, 0, w(), h());

      // Draw sparkles (background twinkle)
      const t = Date.now() / 1000;
      for (const s of sparkles){
        const alpha = 0.3 + 0.5 * Math.abs(Math.sin(t * 2 + s.twinklePhase));
        ctx.globalAlpha = alpha;
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Update + draw particles
      for (let i = particles.length - 1; i >= 0; i--){
        const p = particles[i];
        p.vx *= p.drag;
        p.vy = p.vy * p.drag + p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0){ particles.splice(i, 1); continue; }
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        // Tail glow
        ctx.globalAlpha = Math.max(0, p.life * 0.3);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 2.5 * p.life, 0, Math.PI * 2);
        ctx.fill();
      }

      // Confetti rain
      if (Math.random() < config.confettiRate){
        confetti.push({
          x: Math.random() * w(),
          y: -10,
          vx: (Math.random() - 0.5) * 1.5,
          vy: 1.5 + Math.random() * 2,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.15,
          size: 4 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          shape: Math.random() < 0.5 ? 'rect' : 'circle'
        });
      }
      for (let i = confetti.length - 1; i >= 0; i--){
        const c = confetti[i];
        c.x += c.vx;
        c.y += c.vy;
        c.rot += c.rotSpeed;
        c.vx += (Math.random() - 0.5) * 0.05; // slight wobble
        if (c.y > h() + 20){ confetti.splice(i, 1); continue; }
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = c.color;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        if (c.shape === 'rect'){
          ctx.fillRect(-c.size/2, -c.size/4, c.size, c.size/2);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, c.size/2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
      ctx.globalAlpha = 1;
      frameId = requestAnimationFrame(frame);
    }
    frame();

    // Auto-stop
    const stopTimer = setTimeout(() => {
      clearInterval(burstTimer);
      // Let existing particles fade out, then stop frame
      setTimeout(() => {
        running = false;
        if (frameId) cancelAnimationFrame(frameId);
        ctx.clearRect(0, 0, w(), h());
        window.removeEventListener('resize', onResize);
      }, 3000);
    }, config.duration);

    return {
      stop: () => {
        clearInterval(burstTimer);
        clearTimeout(stopTimer);
        running = false;
        if (frameId) cancelAnimationFrame(frameId);
        window.removeEventListener('resize', onResize);
      }
    };
  }

  function renderFinal(){
    state.screen = 'final';
    const ranked = rankTeams();
    const winner = ranked[0];

    // Compute performance against max possible score
    const maxPerRound = 8; // 2+2+3+1
    const totalRounds = ROUNDS.length;
    const maxPossible = maxPerRound * totalRounds;
    const winnerTier = getPerformanceTier(winner.score, maxPossible);

    // Save high score for the winning team
    const newEntry = {
      name: winner.name,
      icon: winner.icon || '🌊',
      score: winner.score,
      tier: winnerTier.label,
      perfectRounds: winner.perfectRounds,
      bestStreak: winner.bestStreak,
      date: new Date().toISOString()
    };
    const allHighScores = saveHighScore(newEntry);
    // Detect if this is a new high score (top 3)
    const winnerRank = allHighScores.findIndex(s => s.date === newEntry.date) + 1;
    const isNewHighScore = winnerRank > 0 && winnerRank <= 3;
    const isAbsoluteHigh = winnerRank === 1;

    setFooter("Добра наука. Добра преценка. По-добре защитена вода.");

    el.screen.innerHTML = `
      <canvas id="fireworksCanvas" class="fireworks-canvas" aria-hidden="true"></canvas>
      <section class="panel final-panel">
        <div class="kicker">Мисията е завършена</div>

        ${isNewHighScore ? `
          <div class="new-highscore-banner ${isAbsoluteHigh ? 'absolute' : ''}">
            ${isAbsoluteHigh
              ? '<span class="hs-icon">👑</span><span><strong>НОВ РЕКОРД!</strong> Водосборът ще разказва истории за тази игра.</span>'
              : `<span class="hs-icon">🏅</span><span><strong>Top ${winnerRank} резултат!</strong> Сред най-силните игри, записани на това устройство.</span>`
            }
          </div>
        ` : ''}

        <div class="winner center" style="position:relative; z-index:2">
          <div class="tier-значка" style="background: linear-gradient(135deg, ${winnerTier.color}33, ${winnerTier.color}11); border-color: ${winnerTier.color}80; color: ${winnerTier.color}">
            <span class="tier-emoji">${winnerTier.emoji}</span>
            <span>${escapeHtml(winnerTier.label)}</span>
          </div>
          <h2 class="display-title hero-title" style="font-size:48px; margin:14px 0 8px">${escapeHtml(winner.name)}</h2>
          <div class="big-score">${winner.score}</div>
          <div class="subtle">от ${maxPossible} възможни — ${Math.round((winner.score / maxPossible) * 100)}% точност</div>
          <div class="tier-message">${escapeHtml(winnerTier.message)}</div>
        </div>

        <div class="grid2" style="margin-top:18px">
          <div class="panel soft">
            <h3 style="margin-top:0">Крайно класиране</h3>
            <table class="table">
              <thead><tr><th>Място</th><th>Отбор</th><th>Точки</th><th>%</th><th>Перфектни</th><th>Най-добра серия</th></tr></thead>
              <tbody>
                ${ranked.map((team, idx) => `
                  <tr>
                    <td>${idx+1}</td>
                    <td><span class="team-icon">${escapeHtml(team.icon||'🌊')}</span>${escapeHtml(team.name)}</td>
                    <td>${team.score}</td>
                    <td>${Math.round((team.score / maxPossible) * 100)}%</td>
                    <td>${team.perfectRounds}</td>
                    <td>${team.bestStreak}${team.bestStreak >= 2 ? ' 🔥' : ''}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
            <div class="caption" style="margin-top:8px">
              <strong>Серия</strong> = последователни перфектни рундове. Класацията се подрежда по общ резултат.
            </div>
          </div>

          <div class="panel soft">
            <h3 style="margin-top:0">Всички отбори: как се справихте</h3>
            ${ranked.map(team => {
              const teamTier = getPerformanceTier(team.score, maxPossible);
              return `
                <div class="result-team" style="border-left: 3px solid ${teamTier.color}">
                  <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px">
                    <span style="font-size:22px">${teamTier.emoji}</span>
                    <h4 style="margin:0; flex:1"><span class="team-icon">${escapeHtml(team.icon||'🌊')}</span>${escapeHtml(team.name)}</h4>
                    <span style="color:${teamTier.color}; font-weight:700; font-size:13px">${escapeHtml(teamTier.label)}</span>
                  </div>
                  <div class="caption">${escapeHtml(teamTier.message)}</div>
                </div>
              `;
            }).join('')}
          </div>

          <div class="panel soft">
            <h3 style="margin-top:0">Рекорди на това устройство</h3>
            ${allHighScores.length === 0
              ? '<div class="caption">Все още няма записани рекорди.</div>'
              : `<table class="table">
                  <thead><tr><th>#</th><th>Отбор</th><th>Точки</th><th>Ниво</th><th>Дата</th></tr></thead>
                  <tbody>
                    ${allHighScores.slice(0, 10).map((entry, idx) => {
                      const isCurrent = entry.date === newEntry.date;
                      const dateStr = new Date(entry.date).toLocaleDateString();
                      return `
                        <tr class="${isCurrent ? 'highscore-current' : ''}">
                          <td>${idx+1}</td>
                          <td><span class="team-icon">${escapeHtml(entry.icon||'🌊')}</span>${escapeHtml(entry.name)}${isCurrent ? ' <span class="hs-now">← тази игра</span>' : ''}</td>
                          <td><strong>${entry.score}</strong></td>
                          <td style="font-size:12px">${escapeHtml(entry.tier || '—')}</td>
                          <td style="font-size:12px">${escapeHtml(dateStr)}</td>
                        </tr>
                      `;
                    }).join('')}
                  </tbody>
                </table>
                <div class="caption" style="margin-top:8px">
                  Съхранява се локално в този браузър. Запазват се най-добрите 20.
                  <button class="hs-clear-btn" id="hsClearBtn">Изчисти рекордите</button>
                </div>`
            }
          </div>

          <div class="panel soft">
            <h3 style="margin-top:0">Постижения</h3>
            <div class="caption" style="margin-bottom:12px">Декоративни медали — не променят класацията.</div>
            ${ranked.map(team => {
              const earnedMedals = MEDALS.filter(m => {
                try { return m.test(team, state); } catch(e){ return false; }
              });
              team.medals = earnedMedals.map(m => m.id);
              return `
                <div class="result-team" style="margin-bottom:12px">
                  <h4 style="margin:0 0 6px"><span class="team-icon">${escapeHtml(team.icon||'🌊')}</span>${escapeHtml(team.name)}</h4>
                  ${earnedMedals.length === 0
                    ? `<div class="caption" style="font-style:italic">Без медали в тази игра. Реката ще запомни.</div>`
                    : `<div class="medals-row">${earnedMedals.map(m => `<span class="medal" title="${escapeHtml(m.dryline)}"><span class="ico">${m.icon}</span>${escapeHtml(m.label)}</span>`).join('')}</div>`
                  }
                </div>`;
            }).join('')}
          </div>
        </div>

        <div class="narration" style="margin-top:18px; position:relative; z-index:2">
          Мисията е завършена.<br><br>
          Някои решения подобриха системата. Други просто звучаха енергично.
          Важното е, че доказателствата бяха прочетени, изборите бяха направени и към водата се подходи като към нещо, което заслужава да бъде разбрано.
          Това е силно начало.
        </div>

        <div class="actions" style="position:relative; z-index:2">
          <button class="primary" id="playAgainBtn">Играй отново</button>
          <button id="homeBtn">Return to Home</button>
        </div>
      </section>
    `;

    // Start fireworks based on tier
    setTimeout(() => {
      startFireworks({ intensity: winnerTier.celebration });
    }, 200);

    // Multi-stage celebration sound
    setTimeout(() => playPerfectFanfare(), 250);
    if (winnerTier.celebration === 'зрелищно' || winnerTier.celebration === 'голямо'){
      setTimeout(() => playPerfectFanfare(), 1100);
      setTimeout(() => playPerfectFanfare(), 2300);
    }

    document.getElementById('playAgainBtn').onclick = () => {
      playTransition();
      state.roundIndex = 0;
      state.teams.forEach(t => {
        t.score = 0; t.tokens = 2; t.perfectRounds = 0;
        t.correctDiagnosisss = 0; t.correctAction = 0; t.correctEvidence = 0; t.correctCivic = 0;
        t.streak = 0; t.bestStreak = 0; t.hintFreeRounds = 0;
        t.tokensEverUsed = 0; t.totalHintsUsed = 0; t.fastLocks = 0; t.medals = [];
      });
      state.submissions = {};
      state.allRoundResults = {};
      state.activeRounds = pickActiveRounds(); // fresh scenarios for the new mission
      renderOpening();
    };
    document.getElementById('homeBtn').onclick = () => {
      playClick();
      resetGame();
    };
    const clearBtn = document.getElementById('hsClearBtn');
    if (clearBtn){
      clearBtn.onclick = () => {
        if (confirm('Да се изтрият ли всички рекорди от този браузър? Това действие не може да бъде отменено.')){
          clearHighScores();
          playClick();
          renderFinal();
        }
      };
    }
  }

  function renderCurrentFlow(){
    switch(state.screen){
      case 'setup': return renderSetup();
      case 'opening': return renderOpening();
      case 'roundIntro': return renderRoundIntro();
      case 'roll': return renderRoll();
      case 'доказателства': return renderEvidence();
      case 'decision': return renderDecisionHub();
      case 'resolution': return renderResolution();
      case 'final': return renderFinal();
      default: return renderHome();
    }
  }

  function render(){
    if(state.screen === 'home') renderHome();
    else renderCurrentFlow();
  }

  el.audioToggle.onclick = () => {
    unlockAudio();
    state.audioEnabled = !state.audioEnabled;
    if(state.audioEnabled){ ambientStart(); playClick(); }
    else ambientStop();
    el.audioToggle.textContent = `Audio: ${state.audioEnabled ? 'On' : 'Off'}`;
  };
  el.resetBtn.onclick = () => { playClick(); resetGame(); };
  el.howToBtn.onclick = () => { playClick(); renderHowTo(); };
  el.modalBackdrop.addEventListener('click', (e) => {
    if(e.target === el.modalBackdrop){
      closeModal();
      renderDecisionHub();
    }
  });
  window.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && state.currentModalTeam !== null){
      closeModal();
      renderDecisionHub();
    }
  });
  document.body.addEventListener('pointerdown', unlockAudio, { once: true });
  render();
})();
</script>
</body>
</html>
